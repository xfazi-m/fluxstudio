<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona w budowie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#2866fa', primaryHover: '#1c4cc7' },
                    animation: { 
                        'float': 'float 6s ease-in-out infinite',
                        'shimmer': 'shimmer 2s infinite'
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-15px)' } },
                        shimmer: { '100%': { transform: 'translateX(100%)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #ffffff; overflow-x: hidden; }
        .progress-stripes {
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.25) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.25) 50%, rgba(255, 255, 255, 0.25) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
            animation: move-stripes 1s linear infinite;
        }
        @keyframes move-stripes { from { background-position: 1rem 0; } to { background-position: 0 0; } }
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(40, 102, 250, 0.12);
            box-shadow: 0 30px 60px -15px rgba(40, 102, 250, 0.12);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans antialiased text-gray-800 relative bg-white overflow-hidden px-4">
    
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[50vw] h-[50vw] bg-primary/10 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[20%] -right-[10%] w-[50vw] h-[50vw] bg-primary/10 rounded-full blur-[120px]"></div>
    </div>

    <main class="relative z-10 w-full max-w-lg p-8 sm:p-12 glass-panel rounded-3xl animate-float flex flex-col items-center text-center transition-all duration-300 mx-auto">
        
        <div class="relative w-32 h-32 sm:w-40 sm:h-40 mb-6 flex items-center justify-center">
            <img src="https://i.imgur.com/EnH7xKe.png" alt="Logo" class="w-full h-full object-contain select-none">
        </div>

        <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-gray-900 mb-3">
            Strona w budowie
        </h1>

        <div class="flex items-center gap-2.5 text-primary font-bold text-xs sm:text-sm uppercase tracking-widest mb-6 bg-primary/5 px-4 py-2 rounded-full border border-primary/10">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
            </span>
            <span>Prace trwają</span>
        </div>

        <p class="text-gray-500 mb-8 leading-relaxed font-medium text-sm sm:text-base">
            Tworzymy coś niesamowitego! W międzyczasie dołącz na nasz serwer Discord, gdzie poznasz więcej informacji, zobaczysz zapowiedzi i porozmawiasz z naszą społecznością.
        </p>

        <a href="https://discord.gg/fluxstudio" class="group relative inline-flex items-center justify-center w-full sm:w-auto px-8 py-3.5 sm:py-4 font-bold text-white transition-all duration-300 bg-primary rounded-2xl hover:bg-primaryHover hover:-translate-y-1 hover:shadow-[0_12px_24px_rgba(40,102,250,0.35)] focus:outline-none focus:ring-4 focus:ring-primary/40 overflow-hidden">
            <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-shimmer"></div>
            <i class="fab fa-discord text-2xl mr-3 group-hover:scale-110 transition-transform duration-300 relative z-10"></i>
            <span class="relative z-10 text-sm sm:text-base">Dołącz do Discorda</span>
        </a>
        
        <div class="w-full h-3 bg-gray-100 rounded-full mt-10 overflow-hidden shadow-inner border border-gray-200/50 relative">
            <div class="w-[10%] h-full bg-primary rounded-full relative overflow-hidden progress-stripes shadow-[0_0_8px_rgba(40,102,250,0.4)]">
                <div class="absolute top-0 right-0 w-2 h-full bg-white/35 blur-[1px]"></div>
            </div>
        </div>
        
        <div class="flex justify-end w-full mt-2 px-1">
            <p class="text-[11px] sm:text-xs text-primary font-extrabold uppercase tracking-wider">10% Ukończono</p>
        </div>

    </main>

</body>
</html>
